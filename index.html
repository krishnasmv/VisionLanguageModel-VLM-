<!DOCTYPE html>
<html>
<head>
    <title>VisionGPT CLIP App</title>
    <style>
        body {
            font-family: Arial;
            max-width: 700px;
            margin: 40px auto;
        }
        input, button, textarea, select {
            margin: 10px 0;
            width: 100%;
            padding: 10px;
        }
        img {
            max-width: 100%;
            margin-top: 10px;
        }
        .box {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<h2>VisionGPT (CLIP Image Understanding)</h2>

<div class="box">

    <input type="file" id="imageInput" accept="image/*">

    <select id="mode">
        <option value="caption">Caption / Summary</option>
        <option value="classify">Custom Classification</option>
    </select>

    <textarea id="classes" placeholder="For classification only: cat, dog, car (comma separated)"></textarea>

    <button onclick="sendRequest()">Run</button>

    <img id="preview" />

    <h3>Output:</h3>
    <pre id="output"></pre>

</div>

<script>
let fileData = null;

document.getElementById("imageInput").addEventListener("change", function(e) {
    fileData = e.target.files[0];

    let reader = new FileReader();
    reader.onload = function(event) {
        document.getElementById("preview").src = event.target.result;
    };
    reader.readAsDataURL(fileData);
});

async function sendRequest() {
    if (!fileData) {
        alert("Upload an image first");
        return;
    }

    let mode = document.getElementById("mode").value;

    let formData = new FormData();
    formData.append("file", fileData);

    let url = mode === "caption" ? "/caption" : "/classify";

    if (mode === "classify") {
        formData.append("classes", document.getElementById("classes").value);
    }

    let response = await fetch(url, {
        method: "POST",
        body: formData
    });

    let data = await response.json();
    document.getElementById("output").innerText =
        JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
